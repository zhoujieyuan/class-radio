<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>班主任呼叫台</title>
    <style>
        body { font-family: sans-serif; padding: 20px; text-align: center; background-color: #f4f4f4; }
        .container { max-width: 600px; margin: 0 auto; background: white; padding: 30px; border-radius: 10px; }
        input { width: 80%; padding: 15px; font-size: 18px; margin-bottom: 20px; text-align: center; }
        button { width: 100%; padding: 15px; font-size: 18px; color: white; border: none; border-radius: 8px; cursor: pointer; margin-bottom: 10px; }
        .btn-call { background-color: #3498db; }
        .btn-quiet { background-color: #e74c3c; }
        #status { margin-top: 15px; padding: 10px; background: #eee; border-radius: 5px; color: #555; word-break: break-all; }
    </style>
</head>
<body>
    <div class="container">
        <h1>📢 班主任遥控器</h1>
        <input type="text" id="stuName" placeholder="输入学生姓名">
        <button class="btn-call" onclick="sendMsg('call')">叫到来办公室</button>
        <button class="btn-quiet" onclick="sendMsg('quiet')">🤫 全班安静</button>
        
        <!-- 状态显示区域 -->
        <div id="status">正在连接服务器...<br>(如果长时间不动，请检查网络或Host地址)</div>
    </div>

    <script src="https://cdn.goeasy.io/goeasy-2.11.14.min.js"></script>
    <script>
        // ★★★ 你的 Key 已经填好 ★★★
        const myAppKey = "BC-c1aecb7f420643f08afaccb0efc68962"; 
        
        // ★★★ 如果一直连接失败，请去官网看你的“服务地址”是不是 hangzhou.goeasy.io ★★★
        // 如果你的服务地址是其他的，请手动修改下面这一行：
        const myHost = "hangzhou.goeasy.io"; 

        const goEasy = GoEasy.getInstance({
            host: myHost, 
            appkey: myAppKey
        });

        // 连接并显示详细日志
        goEasy.connect({
            onSuccess: function () {
                document.getElementById('status').innerHTML = "✅ <b style='color:green'>连接成功！</b><br>可以发送消息了。";
            },
            onFailed: function (error) {
                document.getElementById('status').innerHTML = "❌ <b style='color:red'>连接失败！</b><br>错误代码: " + error.code + "<br>错误信息: " + error.content;
            },
            onProgress: function(attempts) {
                document.getElementById('status').innerText = "正在尝试第 " + attempts + " 次连接...";
            }
        });

        function sendMsg(type) {
            const name = document.getElementById('stuName').value;
            let text = "";
            if (type === 'call') {
                if (!name) { alert("请输入名字！"); return; }
                text = `请 ${name} 同学，马上到班主任办公室。`;
            } else if (type === 'quiet') {
                text = "全班安静！保持纪律，不要喧哗。";
            }

            goEasy.pub({
                channel: "class_6_channel_v2", // 频道
                message: text,
                onSuccess: function () {
                    alert("发送成功: " + text);
                    if(type==='call') document.getElementById('stuName').value='';
                },
                onFailed: function (error) {
                    alert("发送失败: " + error.content);
                }
            });
        }
    </script>
</body>
</html>
