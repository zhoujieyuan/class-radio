<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>班级广播站</title>
    <style>
        body { background-color: #000; color: #fff; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; font-family: "微软雅黑"; overflow: hidden; margin: 0; }
        #start-mask { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 999; display: flex; justify-content: center; align-items: center; flex-direction: column; }
        #start-btn { padding: 20px 40px; font-size: 24px; background: #27ae60; color: white; border: none; border-radius: 50px; cursor: pointer; }
        #msg-box { font-size: 60px; font-weight: bold; text-align: center; color: #e74c3c; width: 80%; }
        #status-bar { position: fixed; bottom: 10px; color: #555; font-size: 14px; }
    </style>
</head>
<body>
    <!-- 启动遮罩 -->
    <div id="start-mask">
        <button id="start-btn" onclick="initSystem()">🔴 点我开启班级广播</button>
        <p style="margin-top:20px; color:#aaa;">(必须点击一次，浏览器才允许发声)</p>
    </div>

    <h1>📡 班级接收端</h1>
    <div id="msg-box">等待指令...</div>
    <div id="status-bar">系统状态：初始化中...</div>

    <script src="https://cdn.goeasy.io/goeasy-2.11.14.min.js"></script>
    <script>
        // ★★★ 你的 Key 已经填好 ★★★
        const myAppKey = "BC-c1aecb7f420643f08afaccb0efc68962";
        
        // ★★★ 同样，如果不成功，请检查这里是不是 hangzhou.goeasy.io ★★★
        const myHost = "hangzhou.goeasy.io";

        const goEasy = GoEasy.getInstance({ host: myHost, appkey: myAppKey });
        const synth = window.speechSynthesis;
        let isReady = false;

        function initSystem() {
            document.getElementById('start-mask').style.display = 'none';
            isReady = true;
            // 尝试连接
            connectGoEasy();
            // 尝试发声
            speak("系统启动成功");
        }

        function connectGoEasy() {
            document.getElementById('status-bar').innerText = "正在连接 GoEasy 服务器...";
            goEasy.connect({
                onSuccess: function () {
                    document.getElementById('status-bar').innerText = "✅ 连接成功 | 频道: class_6_channel_v2";
                    document.getElementById('msg-box').innerText = "系统就绪";
                    document.getElementById('msg-box').style.color = "#27ae60";
                },
                onFailed: function (error) {
                    document.getElementById('status-bar').innerText = "❌ 连接失败: " + error.content;
                    alert("连接失败！请检查网络或 Key 区域配置。\n错误信息: " + error.content);
                }
            });
        }

        goEasy.sub({
            channel: "class_6_channel_v2",
            onMessage: function (message) {
                const text = message.content;
                const box = document.getElementById('msg-box');
                
                // 显示文字
                box.innerText = text;
                box.style.color = "#fff";
                box.style.background = "#c0392b";
                
                setTimeout(() => {
                    box.style.color = "#e74c3c";
                    box.style.background = "transparent";
                }, 3000);

                // 朗读
                speak(text);
            }
        });

        function speak(text) {
            if(!isReady) return;
            synth.cancel();
            const u = new SpeechSynthesisUtterance(text);
            u.lang = 'zh-CN';
            synth.speak(u);
        }
    </script>
</body>
</html>
