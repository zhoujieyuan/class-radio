<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>班级广播站</title>
    <style>
        body { background-color: #000; color: #fff; height: 100vh; margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; font-family: "微软雅黑"; overflow: hidden; }
        
        /* 启动按钮样式 */
        #start-mask { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 999; display: flex; justify-content: center; align-items: center; flex-direction: column; }
        #start-btn { padding: 20px 40px; font-size: 24px; background: #27ae60; color: white; border: none; border-radius: 50px; cursor: pointer; box-shadow: 0 0 20px #27ae60; animation: pulse 2s infinite; }
        
        h1 { color: #555; font-size: 24px; margin-bottom: 30px; }
        #msg-box { font-size: 80px; font-weight: bold; text-align: center; color: #e74c3c; padding: 40px; border: 4px dashed #333; border-radius: 20px; width: 80%; min-height: 200px; display: flex; align-items: center; justify-content: center; transition: all 0.5s; }

        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
    </style>
</head>
<body>

    <!-- 遮罩层：必须点击才能开启语音 -->
    <div id="start-mask">
        <button id="start-btn" onclick="initAudio()">👉 点击开启班级广播系统 👈</button>
        <p style="margin-top:20px; color:#ccc;">(浏览器规定：必须点击一次才能自动朗读)</p>
    </div>

    <h1>📡 班级实时广播系统</h1>
    <div id="msg-box">等待指令...</div>

    <script src="https://cdn.goeasy.io/goeasy-2.11.14.min.js"></script>
    <script>
        // ▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼
        // 这里的 Key 必须和 teacher.html 里的一模一样！
        const myAppKey = "BC-c1aecb7f420643f08afaccb0efc68962"; 
        // ▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲

        const goEasy = GoEasy.getInstance({
            host: "hangzhou.goeasy.io", 
            appkey: myAppKey
        });

        // 语音合成变量
        const synth = window.speechSynthesis;
        let isAudioReady = false;

        function initAudio() {
            // 点击后隐藏遮罩，并尝试发声
            document.getElementById('start-mask').style.display = 'none';
            isAudioReady = true;
            speak("广播系统已启动，连接正常。");
            document.getElementById('msg-box').innerText = "系统就绪";
            document.getElementById('msg-box').style.borderColor = "#27ae60";
        }

        goEasy.connect({ onSuccess: function () { console.log("连接成功"); } });

        goEasy.sub({
            channel: "class_6_radio",
            onMessage: function (message) {
                const text = message.content;
                
                // 1. 视觉效果：文字变大，闪烁
                const box = document.getElementById('msg-box');
                box.innerText = text;
                box.style.color = "#fff";
                box.style.background = "#e74c3c"; // 红色背景提醒
                
                setTimeout(() => {
                    box.style.color = "#e74c3c";
                    box.style.background = "transparent";
                }, 1000);

                // 2. 朗读
                speak(text);
            }
        });

        function speak(content) {
            if (!isAudioReady) return;
            synth.cancel(); // 打断上一句，直接说新的
            const u = new SpeechSynthesisUtterance(content);
            u.lang = 'zh-CN'; 
            u.rate = 1.0; 
            synth.speak(u);
        }
    </script>
</body>
</html>
